<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ISO 27001 · Test 4</title><style>:root{--bg:#0b1020;--panel:#141b34;--text:#eef2ff;--muted:#b9c2e6;--ok:#1db954;--bad:#ff5d73;--accent:#6ea8fe;--accent-2:#9b7bff;--border:#2a3567;}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#0a0f1f,#101733 45%,#0d1430);color:var(--text)}.container{max-width:1100px;margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,rgba(110,168,254,.18),rgba(155,123,255,.16));border:1px solid var(--border);border-radius:22px;padding:24px}.badges{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 6px}.badge{background:#0f1733;border:1px solid var(--border);color:var(--muted);padding:8px 12px;border-radius:999px;font-size:13px}h1{margin:0 0 10px;font-size:34px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:18px}.card{background:rgba(20,27,52,.92);border:1px solid var(--border);border-radius:18px;padding:18px}label{display:block;font-weight:700;margin:10px 0 6px}input[type=text]{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:#0d1530;color:var(--text)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white}.btn-secondary{background:#202c57;color:var(--text);border:1px solid var(--border)}.quiz-shell{display:none;margin-top:22px}.question-card{background:rgba(20,27,52,.96);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}.q-text{font-size:20px;font-weight:800;margin:8px 0 14px}.options{display:grid;gap:10px}.option{border:1px solid var(--border);background:#0f1733;border-radius:14px;padding:14px;display:flex;gap:12px;cursor:pointer}.option:hover{border-color:#4b62b0}.option input{margin-top:4px}.option.correct{border-color:rgba(29,185,84,.7);background:rgba(29,185,84,.12)}.option.wrong{border-color:rgba(255,93,115,.7);background:rgba(255,93,115,.12)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;border:1px solid var(--border);background:#111936;font-size:13px}.feedback h4{margin:0 0 8px}.feedback p{margin:6px 0}.scorebar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:#0f1733;border:1px solid var(--border);border-radius:16px;padding:14px}.metric .value{font-size:28px;font-weight:900}.metric .label{color:var(--muted);font-size:13px}.report{display:none}.report table{width:100%;border-collapse:collapse;font-size:14px}.report th,.report td{border:1px solid var(--border);padding:10px}.report th{background:#121b39}.pill{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.pill.ok{background:rgba(29,185,84,.16);color:#93ffc0}.pill.bad{background:rgba(255,93,115,.14);color:#ffb2bc}@media print{.hero,.card,.question-card{background:white;color:black;border:1px solid #bbb}.btn-primary,.btn-secondary,.actions{display:none}.report{display:block}.quiz-shell{display:none}}</style></head><body><div class="container"><section class="hero" id="hero"><div class="badges"><span class="badge">Test 4/5</span><span class="badge">8 preguntas</span></div><h1>ISO 27001</h1><div class="grid"><div class="card"><h2>Identificación</h2><label for="username">Usuario</label><input id="username" type="text" maxlength="80" placeholder="Nombre / Cargo" /><div class="actions"><button class="btn-primary" onclick="startQuiz()">Comenzar</button><button class="btn-secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h3>Info</h3><div><strong>Preguntas:</strong> <span id="qCount">8</span></div></div></div></section><section id="quiz" class="quiz-shell"></section><section id="report" class="report card"><h2>Informe</h2><div class="scorebar"><div class="metric"><div class="value" id="scorePct">0%</div><div class="label">Puntuación</div></div><div class="metric"><div class="value" id="scoreHits">0</div><div class="label">Aciertos</div></div><div class="metric"><div class="value" id="scoreFails">0</div><div class="label">Errores</div></div><div class="metric"><div class="value" id="reportUser">—</div><div class="label">Usuario</div></div></div><table><thead><tr><th>#</th><th>Pregunta</th><th>Tu respuesta</th><th>Correcta</th><th>Resultado</th></tr></thead><tbody id="reportBody"></tbody></table></section></div><script>const q = [{"q":"¿Cuál de las siguientes opciones refleja mejor el requisito de seguimiento, medición, análisis y evaluación?","options":["Medir únicamente el número total de incidentes de seguridad comunicados durante el año.","Determinar qué monitorizar y medir, métodos válidos, cuándo medir, quién mide, cuándo analizar/evaluar, quién analiza/evalúa, conservar evidencia y evaluar desempeño y eficacia del SGSI.","Delegar todas las métricas en el proveedor de SOC y usar sus informes sin análisis interno.","Sustituir los indicadores por auditorías internas, porque ambas actividades tienen el mismo objetivo."],"correct":1,"explain":"Justificación: B es correcta porque el apartado 9.1 exige determinar qué se monitoriza y mide, los métodos, cuándo se mide, quién lo hace, cuándo se analizan y evalúan resultados, quién los analiza y evalúa, conservar evidencia y evaluar desempeño de seguridad y eficacia del SGSI. A es demasiado limitada: un único conteo de incidentes no cubre procesos, controles ni eficacia. C es insuficiente porque usar informes externos sin análisis propio no garantiza evaluación del SGSI. D confunde actividades complementarias: auditoría interna no sustituye seguimiento y medición."},{"q":"Una organización define métodos de medición que cambian cada mes y producen resultados no comparables. ¿Qué problema existe?","options":["Ninguno, porque la norma no exige comparabilidad en ningún caso.","Solo existe problema si los resultados son negativos.","Los métodos seleccionados deben permitir resultados válidos; para considerarlos válidos deberían producir resultados comparables y reproducibles.","El único problema es que los métodos no están automatizados."],"correct":2,"explain":"Justificación: C es correcta porque los métodos de seguimiento, medición, análisis y evaluación deben garantizar resultados válidos, y la norma indica que los métodos seleccionados deberían producir resultados comparables y reproducibles para considerarse válidos. A es falsa porque la comparabilidad sí forma parte de la lógica de validez. B es incorrecta: el problema existe aunque los resultados sean favorables. D puede ser una mejora operativa, pero la automatización no es el requisito; lo esencial es validez, comparabilidad y reproducibilidad."},{"q":"¿Qué debe proporcionar la auditoría interna del SGSI?","options":["Confirmación de que no existe ningún riesgo residual.","Información sobre si el SGSI cumple los requisitos propios de la organización y los de la norma, y si está implementado y mantenido eficazmente.","Un certificado interno equivalente al certificado de tercera parte.","La aprobación formal de la Declaración de Aplicabilidad."],"correct":1,"explain":"Justificación: B es correcta porque la auditoría interna proporciona información sobre conformidad con los requisitos propios de la organización y los de la norma, así como sobre implementación y mantenimiento eficaz del SGSI. A es imposible y contraria a la gestión de riesgos: pueden existir riesgos residuales aceptados. C es falso porque una auditoría interna no equivale a certificación de tercera parte. D es incorrecto porque la Declaración de Aplicabilidad se elabora en tratamiento de riesgos; la auditoría puede evaluarla, no aprobarla necesariamente."},{"q":"Al establecer el programa de auditoría interna, ¿qué debe tenerse en cuenta expresamente?","options":["Solo la disponibilidad del equipo auditor, para reducir interrupciones operativas.","La importancia de los procesos involucrados y los resultados de auditorías previas.","Únicamente la lista de controles excluidos del Anexo A.","La fecha de caducidad del certificado, sin considerar procesos ni resultados anteriores."],"correct":1,"explain":"Justificación: B es correcta porque, al establecer el programa de auditoría interna, deben tenerse en cuenta la importancia de los procesos involucrados y los resultados de auditorías previas, además de aspectos como frecuencia, métodos, responsabilidades, planificación e informes. A es una consideración práctica, pero no suficiente. C es demasiado estrecha y limita la auditoría a controles excluidos. D también es insuficiente: la fecha de certificación puede influir en planificación, pero no sustituye el enfoque basado en importancia y resultados previos."},{"q":"En una auditoría interna, el responsable de un proceso audita su propio proceso porque es quien mejor lo conoce. ¿Cuál es la valoración más alineada con la norma?","options":["Es siempre aceptable, porque el conocimiento del proceso es más importante que la independencia.","Es aceptable solo si no se documentan hallazgos.","Deben seleccionarse auditores y realizar auditorías de forma que se asegure la objetividad e imparcialidad del proceso.","La norma prohíbe que cualquier persona interna audite el SGSI."],"correct":2,"explain":"Justificación: C es correcta porque la norma exige seleccionar auditores y realizar auditorías asegurando objetividad e imparcialidad. A es incorrecta porque el conocimiento del proceso no compensa un conflicto de objetividad. B no resuelve el problema: no documentar hallazgos sería contrario a la finalidad de la auditoría. D es falsa porque la norma no prohíbe auditorías internas realizadas por personal interno; exige que el proceso sea objetivo e imparcial."},{"q":"¿Cuál de los siguientes elementos pertenece claramente a las entradas de la revisión por la dirección?","options":["Únicamente el presupuesto del próximo año del área de seguridad.","Estado de acciones de revisiones previas, cambios en cuestiones internas/externas, cambios en necesidades de partes interesadas, tendencias de desempeño, feedback, resultados de evaluación de riesgos, estado del plan de tratamiento y oportunidades de mejora.","Solo resultados de auditoría externa, porque la revisión por la dirección es una actividad de certificación.","Exclusivamente incidentes críticos, porque los incidentes menores se tratan en operación."],"correct":1,"explain":"Justificación: B es correcta porque integra las principales entradas de revisión por la dirección: acciones previas, cambios de contexto y partes interesadas, información de desempeño, feedback, riesgos y plan de tratamiento, y oportunidades de mejora. A es demasiado limitada; el presupuesto puede ser relevante, pero no cubre las entradas requeridas. C es falso porque la revisión por la dirección no se reduce a certificación externa. D es incorrecto porque la revisión considera tendencias y desempeño, no solo incidentes críticos."},{"q":"¿Qué deben incluir los resultados de la revisión por la dirección?","options":["Decisiones relacionadas con oportunidades de mejora continua y cualquier necesidad de cambio en el SGSI, con evidencia documentada de los resultados.","Un nuevo mapa de riesgos completo en cada revisión, aunque no haya cambios significativos.","La aprobación automática de todos los riesgos residuales.","La sustitución de la auditoría interna si la alta dirección considera eficaz el sistema."],"correct":0,"explain":"Justificación: A es correcta porque los resultados de la revisión deben incluir decisiones sobre oportunidades de mejora continua y necesidades de cambio del SGSI, y debe haber información documentada como evidencia. B puede ser necesario si el contexto lo exige, pero no es obligación rehacer siempre todo el mapa de riesgos. C es incorrecta: la aceptación de residuales corresponde al tratamiento de riesgos y a los dueños de riesgo. D es falsa porque la revisión por la dirección no sustituye la auditoría interna."},{"q":"Ante una no conformidad, ¿cuál es el enfoque correcto de acción correctiva según la norma?","options":["Corregir el caso concreto y cerrarlo sin analizar causas si no se ha repetido.","Reaccionar, controlar y corregir según aplique, tratar consecuencias, evaluar necesidad de eliminar causas para evitar recurrencia u ocurrencia en otra parte, implementar acciones, revisar eficacia y cambiar el SGSI si es necesario.","Abrir siempre una acción disciplinaria individual, porque toda no conformidad deriva de incumplimiento personal.","Esperar a la revisión por la dirección para decidir si se actúa."],"correct":1,"explain":"Justificación: B es correcta porque refleja el ciclo de gestión de no conformidades: reaccionar, controlar/corregir, tratar consecuencias, analizar causas y posibles no conformidades similares o potenciales, implementar acciones, revisar eficacia y modificar el SGSI si procede. A es incompleta porque una corrección puntual no siempre elimina causas ni previene recurrencia. C es incorrecta: no toda no conformidad exige acción disciplinaria. D contradice la necesidad de reaccionar ante la no conformidad; no debe esperarse pasivamente a la revisión por la dirección."}]; const state = {answers: new Array(q.length).fill(null)}; function escapeHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");} function startQuiz(){renderQuiz(); document.getElementById("quiz").style.display="block"; document.getElementById("hero").style.display="none";} function renderQuiz(){const s = document.getElementById("quiz"); s.innerHTML = q.map((qu,i) => "<article class=\"question-card\"><div class=\"q-text\">" + escapeHtml(qu.q) + "</div><div class=\"options\">" + qu.options.map((o,j) => "<label class=\"option\"><input type=\"radio\" name=\"q" + i + "\" value=\"" + j + "\" onchange=\"answerQuestion(" + i + "," + j + ")\"/><span>" + escapeHtml(o) + "</span></label>").join("") + "</div><div class=\"feedback\" id=\"f" + i + "\"></div></article>").join("") + "<div class=\"actions\" style=\"margin-top:24px;justify-content:center;\"><button class=\"btn-primary\" onclick=\"submit()\">Enviar</button><button class=\"btn-secondary\" onclick=\"reset()\">Limpiar</button></div>";} function answerQuestion(i,v){state.answers[i] = v;} function submit(){const u = state.answers.map((v,i) => v === null ? i : null).filter(v => v !== null); if(u.length){alert("Contesta: " + u.map(i => i+1).join(", ")); return;} const user = document.getElementById("username").value.trim() || "Invitado"; const h = q.filter((qu,i) => qu.correct === state.answers[i]).length; const p = Math.round(h/q.length*100); q.forEach((qu,i) => {const se = state.answers[i]; const ok = se === qu.correct; document.querySelector("input[name=\"q" + i + "\"][value=\"" + se + "\"]").parentElement.classList.add(ok ? "correct" : "wrong"); document.querySelector("input[name=\"q" + i + "\"][value=\"" + qu.correct + "\"]").parentElement.classList.add("correct"); const fb = document.getElementById("f" + i); fb.className = "feedback " + (ok ? "ok" : "bad"); fb.innerHTML = "<h4>" + (ok ? "✅" : "❌") + "</h4><p><strong>Tu respuesta:</strong> " + escapeHtml(qu.options[se]) + "</p>" + (ok ? "" : "<p><strong>Correcta:</strong> " + escapeHtml(qu.options[qu.correct]) + "</p>") + (qu.explain ? "<p><strong>Justificación:</strong> " + escapeHtml(qu.explain) + "</p>" : ""); fb.style.display = "block";}); document.querySelector("#quiz .actions").innerHTML = "<button class=\"btn-primary\" onclick=\"showReport()\">Ver informe</button><button class=\"btn-secondary\" onclick=\"reset()\">Reintentar</button>"; state.score = {user, pct: p, hits: h, fails: q.length - h};} function showReport(){document.getElementById("scorePct").textContent = state.score.pct + "%"; document.getElementById("scoreHits").textContent = state.score.hits; document.getElementById("scoreFails").textContent = state.score.fails; document.getElementById("reportUser").textContent = state.score.user; document.getElementById("reportBody").innerHTML = q.map((qu,i) => {const ok = state.answers[i] === qu.correct; return "<tr><td>" + (i+1) + "</td><td>" + escapeHtml(qu.q) + "</td><td>" + escapeHtml(qu.options[state.answers[i]]) + "</td><td>" + escapeHtml(qu.options[qu.correct]) + "</td><td><span class=\"pill " + (ok ? "ok" : "bad") + "\">" + (ok ? "✓" : "✗") + "</span></td></tr>";}).join(""); document.getElementById("quiz").style.display = "none"; document.getElementById("report").style.display = "block";} function reset(){if(confirm("¿Limpiar y volver al inicio?")){state.answers = new Array(q.length).fill(null); document.getElementById("report").style.display = "none"; document.getElementById("quiz").style.display = "none"; document.getElementById("hero").style.display = "block";}}</script></body></html>
