<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ISO 27001 · Test 2</title><style>:root{--bg:#0b1020;--panel:#141b34;--text:#eef2ff;--muted:#b9c2e6;--ok:#1db954;--bad:#ff5d73;--accent:#6ea8fe;--accent-2:#9b7bff;--border:#2a3567;}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#0a0f1f,#101733 45%,#0d1430);color:var(--text)}.container{max-width:1100px;margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,rgba(110,168,254,.18),rgba(155,123,255,.16));border:1px solid var(--border);border-radius:22px;padding:24px}.badges{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 6px}.badge{background:#0f1733;border:1px solid var(--border);color:var(--muted);padding:8px 12px;border-radius:999px;font-size:13px}h1{margin:0 0 10px;font-size:34px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:18px}.card{background:rgba(20,27,52,.92);border:1px solid var(--border);border-radius:18px;padding:18px}label{display:block;font-weight:700;margin:10px 0 6px}input[type=text]{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:#0d1530;color:var(--text)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white}.btn-secondary{background:#202c57;color:var(--text);border:1px solid var(--border)}.quiz-shell{display:none;margin-top:22px}.question-card{background:rgba(20,27,52,.96);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}.q-text{font-size:20px;font-weight:800;margin:8px 0 14px}.options{display:grid;gap:10px}.option{border:1px solid var(--border);background:#0f1733;border-radius:14px;padding:14px;display:flex;gap:12px;cursor:pointer}.option:hover{border-color:#4b62b0}.option input{margin-top:4px}.option.correct{border-color:rgba(29,185,84,.7);background:rgba(29,185,84,.12)}.option.wrong{border-color:rgba(255,93,115,.7);background:rgba(255,93,115,.12)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;border:1px solid var(--border);background:#111936;font-size:13px}.feedback h4{margin:0 0 8px}.feedback p{margin:6px 0}.scorebar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:#0f1733;border:1px solid var(--border);border-radius:16px;padding:14px}.metric .value{font-size:28px;font-weight:900}.metric .label{color:var(--muted);font-size:13px}.report{display:none}.report table{width:100%;border-collapse:collapse;font-size:14px}.report th,.report td{border:1px solid var(--border);padding:10px}.report th{background:#121b39}.pill{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.pill.ok{background:rgba(29,185,84,.16);color:#93ffc0}.pill.bad{background:rgba(255,93,115,.14);color:#ffb2bc}@media print{.hero,.card,.question-card{background:white;color:black;border:1px solid #bbb}.btn-primary,.btn-secondary,.actions{display:none}.report{display:block}.quiz-shell{display:none}}</style></head><body><div class="container"><section class="hero" id="hero"><div class="badges"><span class="badge">Test 2/5</span><span class="badge">8 preguntas</span></div><h1>ISO 27001</h1><div class="grid"><div class="card"><h2>Identificación</h2><label for="username">Usuario</label><input id="username" type="text" maxlength="80" placeholder="Nombre / Cargo" /><div class="actions"><button class="btn-primary" onclick="startQuiz()">Comenzar</button><button class="btn-secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h3>Info</h3><div><strong>Preguntas:</strong> <span id="qCount">8</span></div></div></div></section><section id="quiz" class="quiz-shell"></section><section id="report" class="report card"><h2>Informe</h2><div class="scorebar"><div class="metric"><div class="value" id="scorePct">0%</div><div class="label">Puntuación</div></div><div class="metric"><div class="value" id="scoreHits">0</div><div class="label">Aciertos</div></div><div class="metric"><div class="value" id="scoreFails">0</div><div class="label">Errores</div></div><div class="metric"><div class="value" id="reportUser">—</div><div class="label">Usuario</div></div></div><table><thead><tr><th>#</th><th>Pregunta</th><th>Tu respuesta</th><th>Correcta</th><th>Resultado</th></tr></thead><tbody id="reportBody"></tbody></table></section></div><script>const q = [{"q":"Al planificar el SGSI, la organización identifica cuestiones internas y externas y requisitos de partes interesadas, pero no determina riesgos y oportunidades relacionados con los resultados previstos del sistema. ¿Qué falta principalmente?","options":["La aprobación de la política por el responsable de seguridad.","La selección directa de todos los controles del Anexo A.","Determinar riesgos y oportunidades para asegurar resultados previstos, prevenir o reducir efectos no deseados y lograr mejora continua.","La ejecución de una auditoría externa antes de definir acciones."],"correct":2,"explain":"Justificación: C es correcta porque el apartado 6.1.1 exige que, al planificar el SGSI, se determinen riesgos y oportunidades para asegurar los resultados previstos, prevenir o reducir efectos indeseados y lograr mejora continua, además de planificar acciones e integrarlas en los procesos. A no aborda la planificación del riesgo. B confunde planificación con selección automática de controles. D introduce una auditoría externa previa que la norma no exige como condición para planificar."},{"q":"¿Cuál de las siguientes opciones describe mejor el proceso de evaluación de riesgos de seguridad de la información exigido por la norma?","options":["Definir criterios de riesgo, asegurar resultados consistentes y comparables, identificar riesgos y dueños, analizar consecuencias y probabilidad, determinar niveles, comparar con criterios y priorizar tratamiento.","Elaborar una matriz de riesgos, seleccionar controles del Anexo A y cerrar todos los riesgos no aceptables antes de operar el SGSI.","Identificar amenazas técnicas, asignarlas al área de sistemas y documentar vulnerabilidades críticas.","Calcular un nivel de riesgo únicamente a partir de probabilidad, porque el impacto se trata en el plan de continuidad."],"correct":0,"explain":"Justificación: A es correcta porque recoge los elementos esenciales del proceso de evaluación: criterios, consistencia, identificación de riesgos asociados a confidencialidad, integridad y disponibilidad, dueños, consecuencias, probabilidad, niveles, comparación con criterios y priorización. B mezcla evaluación y tratamiento y añade una obligación de cerrar todos los riesgos antes de operar que la norma no formula. C es demasiado estrecha porque limita la seguridad de la información a amenazas técnicas. D es incorrecta porque el análisis debe considerar consecuencias y probabilidad, no solo probabilidad."},{"q":"En una evaluación de riesgos, se identifican riesgos asociados a pérdida de confidencialidad, integridad y disponibilidad, pero no se asignan dueños de riesgo. ¿Cuál es la consecuencia normativa más precisa?","options":["No hay problema si cada riesgo tiene un control asociado.","Es una deficiencia solo si el riesgo residual supera el apetito de riesgo.","Puede resolverse sustituyendo al dueño del riesgo por el responsable técnico del activo.","Falta un elemento requerido del proceso de evaluación de riesgos, porque deben identificarse los dueños de los riesgos."],"correct":3,"explain":"Justificación: D es correcta porque el proceso de evaluación de riesgos debe incluir la identificación de los dueños de los riesgos. A es insuficiente: tener controles no sustituye la responsabilidad sobre el riesgo. B es incorrecta porque el requisito de identificar dueños no depende de que el residual supere un umbral. C puede ser válido solo si el responsable técnico es realmente el dueño del riesgo según la organización, pero no puede sustituirse automáticamente la propiedad del riesgo por la responsabilidad técnica del activo."},{"q":"¿Cuál es la secuencia más coherente con el tratamiento de riesgos según el apartado 6.1.3?","options":["Elegir controles del Anexo A, implantarlos todos, redactar la política y después aceptar riesgos residuales.","Seleccionar opciones de tratamiento, determinar controles necesarios, compararlos con el Anexo A, elaborar la Declaración de Aplicabilidad, formular el plan de tratamiento y obtener aprobación del plan y aceptación de riesgos residuales.","Elaborar la Declaración de Aplicabilidad, excluir controles no implantados y después hacer la evaluación de riesgos.","Aceptar todos los riesgos residuales primero y después seleccionar controles para evidenciar mejora continua."],"correct":1,"explain":"Justificación: B es correcta porque reproduce la lógica de tratamiento: partir de los resultados de la evaluación, elegir opciones de tratamiento, determinar controles necesarios, contrastarlos con el Anexo A, elaborar la Declaración de Aplicabilidad, formular el plan y obtener aprobación y aceptación de residuales. A invierte la lógica y presupone implantar todos los controles. C es incorrecta porque la Declaración de Aplicabilidad depende de la evaluación y tratamiento, no los sustituye. D también invierte el proceso: no se aceptan residuales antes de conocer tratamiento y controles."},{"q":"¿Cuál es la interpretación correcta del Anexo A en la selección de controles?","options":["Todos los controles del Anexo A son obligatorios para todas las organizaciones certificadas.","Solo pueden usarse controles del Anexo A; no se admiten controles diseñados por la organización.","El Anexo A se usa como referencia para comprobar que no se han omitido controles necesarios, pero no es una lista exhaustiva y pueden existir controles adicionales.","El Anexo A solo es informativo y no tiene relación con la Declaración de Aplicabilidad."],"correct":2,"explain":"Justificación: C es correcta porque el Anexo A actúa como conjunto de controles de referencia para comprobar que no se han pasado por alto controles necesarios, y la norma admite controles diseñados por la organización o identificados en otras fuentes. A es falsa: los controles del Anexo A no son todos obligatorios en todos los casos; las exclusiones deben justificarse. B es falsa porque se permiten controles adicionales. D es falsa porque el Anexo A es normativo y se usa explícitamente en el contexto de 6.1.3 y la Declaración de Aplicabilidad."},{"q":"¿Qué debe contener la Declaración de Aplicabilidad para ser coherente con el apartado 6.1.3?","options":["Controles necesarios, justificación de inclusiones, estado de implementación y justificación de exclusiones de controles del Anexo A.","Únicamente los controles implantados, porque los no implantados no forman parte del SGSI.","Todos los riesgos identificados, sus causas raíz y la fecha de cierre de cada acción correctiva.","El plan de auditoría interna y los resultados de la revisión por la dirección."],"correct":0,"explain":"Justificación: A es correcta porque la Declaración de Aplicabilidad debe contener los controles necesarios, la justificación de inclusiones, si están implementados o no y la justificación de exclusiones de controles del Anexo A. B es incorrecta porque también deben aparecer controles necesarios aunque aún no estén implementados. C describe más bien información propia de evaluación o tratamiento de riesgos, no el contenido mínimo específico de la Declaración de Aplicabilidad. D pertenece a evaluación del desempeño y revisión, no al contenido de la Declaración de Aplicabilidad."},{"q":"Una organización formula un plan de tratamiento, pero la aceptación de los riesgos residuales la firma únicamente el responsable del SGSI, sin participación de los dueños de riesgo. ¿Qué valoración es más correcta?","options":["Es correcto si el responsable del SGSI tiene suficiente experiencia técnica.","Es correcto si los riesgos residuales están por debajo del nivel alto.","Es correcto si el plan fue comunicado a la alta dirección.","No es correcto, porque la norma exige aprobación del plan de tratamiento y aceptación de riesgos residuales por parte de los dueños de los riesgos."],"correct":3,"explain":"Justificación: D es correcta porque el apartado 6.1.3 exige obtener la aprobación del plan de tratamiento y la aceptación de los riesgos residuales por parte de los dueños de los riesgos. A es incorrecta porque la experiencia técnica no sustituye la propiedad del riesgo. B es incorrecta porque el nivel del riesgo no elimina el requisito de aceptación por el dueño. C puede ser una buena práctica de comunicación, pero informar a la alta dirección no equivale necesariamente a aceptación de residuales por quienes son propietarios del riesgo."},{"q":"¿Cuál de estas formulaciones de objetivos de seguridad de la información se ajusta mejor a la lógica del apartado 6.2?","options":["“Mejorar la seguridad siempre que sea posible”, sin responsable, plazo ni método de evaluación.","“Reducir en un 20% los incidentes de acceso no autorizado en los servicios incluidos en el alcance antes del cierre del año, con responsable, recursos, seguimiento mensual y evaluación de resultados”.","“Cumplir ISO/IEC 27001”, porque el objetivo global sustituye a objetivos por funciones y niveles.","“Implantar todos los controles del Anexo A”, porque la norma exige que todo objetivo sea un control."],"correct":1,"explain":"Justificación: B es correcta porque plantea un objetivo coherente con la política, medible, monitorizable, con responsable, plazo, recursos y método de evaluación. A es demasiado genérica y no permite evaluar resultados. C es un enunciado global de conformidad, pero no sustituye la necesidad de objetivos pertinentes por funciones y niveles. D es incorrecta porque los objetivos no son simplemente controles del Anexo A; deben tener en cuenta requisitos aplicables y resultados de evaluación y tratamiento de riesgos."}]; const state = {answers: new Array(q.length).fill(null)}; function escapeHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");} function startQuiz(){renderQuiz(); document.getElementById("quiz").style.display="block"; document.getElementById("hero").style.display="none";} function renderQuiz(){const s = document.getElementById("quiz"); s.innerHTML = q.map((qu,i) => "<article class=\"question-card\"><div class=\"q-text\">" + escapeHtml(qu.q) + "</div><div class=\"options\">" + qu.options.map((o,j) => "<label class=\"option\"><input type=\"radio\" name=\"q" + i + "\" value=\"" + j + "\" onchange=\"answerQuestion(" + i + "," + j + ")\"/><span>" + escapeHtml(o) + "</span></label>").join("") + "</div><div class=\"feedback\" id=\"f" + i + "\"></div></article>").join("") + "<div class=\"actions\" style=\"margin-top:24px;justify-content:center;\"><button class=\"btn-primary\" onclick=\"submit()\">Enviar</button><button class=\"btn-secondary\" onclick=\"reset()\">Limpiar</button></div>";} function answerQuestion(i,v){state.answers[i] = v;} function submit(){const u = state.answers.map((v,i) => v === null ? i : null).filter(v => v !== null); if(u.length){alert("Contesta: " + u.map(i => i+1).join(", ")); return;} const user = document.getElementById("username").value.trim() || "Invitado"; const h = q.filter((qu,i) => qu.correct === state.answers[i]).length; const p = Math.round(h/q.length*100); q.forEach((qu,i) => {const se = state.answers[i]; const ok = se === qu.correct; document.querySelector("input[name=\"q" + i + "\"][value=\"" + se + "\"]").parentElement.classList.add(ok ? "correct" : "wrong"); document.querySelector("input[name=\"q" + i + "\"][value=\"" + qu.correct + "\"]").parentElement.classList.add("correct"); const fb = document.getElementById("f" + i); fb.className = "feedback " + (ok ? "ok" : "bad"); fb.innerHTML = "<h4>" + (ok ? "✅" : "❌") + "</h4><p><strong>Tu respuesta:</strong> " + escapeHtml(qu.options[se]) + "</p>" + (ok ? "" : "<p><strong>Correcta:</strong> " + escapeHtml(qu.options[qu.correct]) + "</p>") + (qu.explain ? "<p><strong>Justificación:</strong> " + escapeHtml(qu.explain) + "</p>" : ""); fb.style.display = "block";}); document.querySelector("#quiz .actions").innerHTML = "<button class=\"btn-primary\" onclick=\"showReport()\">Ver informe</button><button class=\"btn-secondary\" onclick=\"reset()\">Reintentar</button>"; state.score = {user, pct: p, hits: h, fails: q.length - h};} function showReport(){document.getElementById("scorePct").textContent = state.score.pct + "%"; document.getElementById("scoreHits").textContent = state.score.hits; document.getElementById("scoreFails").textContent = state.score.fails; document.getElementById("reportUser").textContent = state.score.user; document.getElementById("reportBody").innerHTML = q.map((qu,i) => {const ok = state.answers[i] === qu.correct; return "<tr><td>" + (i+1) + "</td><td>" + escapeHtml(qu.q) + "</td><td>" + escapeHtml(qu.options[state.answers[i]]) + "</td><td>" + escapeHtml(qu.options[qu.correct]) + "</td><td><span class=\"pill " + (ok ? "ok" : "bad") + "\">" + (ok ? "✓" : "✗") + "</span></td></tr>";}).join(""); document.getElementById("quiz").style.display = "none"; document.getElementById("report").style.display = "block";} function reset(){if(confirm("¿Limpiar y volver al inicio?")){state.answers = new Array(q.length).fill(null); document.getElementById("report").style.display = "none"; document.getElementById("quiz").style.display = "none"; document.getElementById("hero").style.display = "block";}}</script></body></html>
