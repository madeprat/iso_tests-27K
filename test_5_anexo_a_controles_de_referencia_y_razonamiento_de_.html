<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ISO 27001 · Test 5</title><style>:root{--bg:#0b1020;--panel:#141b34;--text:#eef2ff;--muted:#b9c2e6;--ok:#1db954;--bad:#ff5d73;--accent:#6ea8fe;--accent-2:#9b7bff;--border:#2a3567;}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#0a0f1f,#101733 45%,#0d1430);color:var(--text)}.container{max-width:1100px;margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,rgba(110,168,254,.18),rgba(155,123,255,.16));border:1px solid var(--border);border-radius:22px;padding:24px}.badges{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 6px}.badge{background:#0f1733;border:1px solid var(--border);color:var(--muted);padding:8px 12px;border-radius:999px;font-size:13px}h1{margin:0 0 10px;font-size:34px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:18px}.card{background:rgba(20,27,52,.92);border:1px solid var(--border);border-radius:18px;padding:18px}label{display:block;font-weight:700;margin:10px 0 6px}input[type=text]{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:#0d1530;color:var(--text)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white}.btn-secondary{background:#202c57;color:var(--text);border:1px solid var(--border)}.quiz-shell{display:none;margin-top:22px}.question-card{background:rgba(20,27,52,.96);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}.q-text{font-size:20px;font-weight:800;margin:8px 0 14px}.options{display:grid;gap:10px}.option{border:1px solid var(--border);background:#0f1733;border-radius:14px;padding:14px;display:flex;gap:12px;cursor:pointer}.option:hover{border-color:#4b62b0}.option input{margin-top:4px}.option.correct{border-color:rgba(29,185,84,.7);background:rgba(29,185,84,.12)}.option.wrong{border-color:rgba(255,93,115,.7);background:rgba(255,93,115,.12)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;border:1px solid var(--border);background:#111936;font-size:13px}.feedback h4{margin:0 0 8px}.feedback p{margin:6px 0}.scorebar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:#0f1733;border:1px solid var(--border);border-radius:16px;padding:14px}.metric .value{font-size:28px;font-weight:900}.metric .label{color:var(--muted);font-size:13px}.report{display:none}.report table{width:100%;border-collapse:collapse;font-size:14px}.report th,.report td{border:1px solid var(--border);padding:10px}.report th{background:#121b39}.pill{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.pill.ok{background:rgba(29,185,84,.16);color:#93ffc0}.pill.bad{background:rgba(255,93,115,.14);color:#ffb2bc}@media print{.hero,.card,.question-card{background:white;color:black;border:1px solid #bbb}.btn-primary,.btn-secondary,.actions{display:none}.report{display:block}.quiz-shell{display:none}}</style></head><body><div class="container"><section class="hero" id="hero"><div class="badges"><span class="badge">Test 5/5</span><span class="badge">8 preguntas</span></div><h1>ISO 27001</h1><div class="grid"><div class="card"><h2>Identificación</h2><label for="username">Usuario</label><input id="username" type="text" maxlength="80" placeholder="Nombre / Cargo" /><div class="actions"><button class="btn-primary" onclick="startQuiz()">Comenzar</button><button class="btn-secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h3>Info</h3><div><strong>Preguntas:</strong> <span id="qCount">8</span></div></div></div></section><section id="quiz" class="quiz-shell"></section><section id="report" class="report card"><h2>Informe</h2><div class="scorebar"><div class="metric"><div class="value" id="scorePct">0%</div><div class="label">Puntuación</div></div><div class="metric"><div class="value" id="scoreHits">0</div><div class="label">Aciertos</div></div><div class="metric"><div class="value" id="scoreFails">0</div><div class="label">Errores</div></div><div class="metric"><div class="value" id="reportUser">—</div><div class="label">Usuario</div></div></div><table><thead><tr><th>#</th><th>Pregunta</th><th>Tu respuesta</th><th>Correcta</th><th>Resultado</th></tr></thead><tbody id="reportBody"></tbody></table></section></div><script>const q = [{"q":"¿Cuál es la forma correcta de entender los controles del Anexo A dentro de ISO/IEC 27001:2023?","options":["Son todos obligatorios y deben implementarse sin excepción en cualquier organización.","Son controles de referencia, alineados con ISO/IEC 27002:2022, que deben emplearse en el contexto del tratamiento de riesgos para comprobar que no se omiten controles necesarios.","Son recomendaciones informativas sin relación con la certificación.","Sustituyen la evaluación de riesgos cuando la organización decide aplicar todos los controles."],"correct":1,"explain":"Justificación: B es correcta porque el Anexo A contiene controles de referencia que se corresponden con ISO/IEC 27002:2022 y se emplean en el contexto de 6.1.3 para contrastar los controles necesarios. A es incorrecta porque no todos los controles son obligatorios para todos los casos; las exclusiones se justifican en la Declaración de Aplicabilidad. C es falsa porque el Anexo A es normativo y forma parte del mecanismo de selección de controles. D es incorrecta porque aplicar controles no sustituye la evaluación y tratamiento de riesgos."},{"q":"Durante el tratamiento de riesgos, una organización identifica la necesidad de un control propio que no aparece literalmente en el Anexo A. ¿Qué interpretación es correcta?","options":["Puede diseñar controles según sea necesario o identificarlos a partir de otras fuentes, y después contrastar con el Anexo A para no omitir controles necesarios.","Debe descartarlo porque solo son aceptables los controles del Anexo A.","Debe incorporarlo únicamente si se elimina un control equivalente del Anexo A.","Debe considerarlo una no conformidad, porque los controles adicionales alteran la norma."],"correct":0,"explain":"Justificación: A es correcta porque la norma permite diseñar controles según sea necesario o identificarlos a partir de cualquier fuente, y exige comparar con el Anexo A para no omitir controles necesarios. B es falsa porque el Anexo A no agota todas las posibilidades. C inventa una lógica de intercambio que la norma no contempla. D es lo contrario de la norma: los controles adicionales pueden ser necesarios si el riesgo, el contexto o los requisitos aplicables lo justifican."},{"q":"Una organización quiere diferenciar información pública, interna, confidencial y altamente confidencial en función de confidencialidad, integridad, disponibilidad y requisitos de partes interesadas. ¿Qué control del Anexo A encaja mejor con esa necesidad?","options":["5.13 Etiquetado de la información.","5.14 Transferencia de la información.","5.12 Clasificación de la información.","5.17 Información de autenticación."],"correct":2,"explain":"Justificación: C es correcta porque 5.12 se refiere a clasificar la información conforme a necesidades de seguridad, considerando confidencialidad, integridad, disponibilidad y requisitos pertinentes. A es cercano pero no principal: el etiquetado 5.13 aplica procedimientos para marcar información conforme al esquema de clasificación ya adoptado. B trata reglas o acuerdos para transferir información. D se refiere a información de autenticación, no a categorías de clasificación de la información."},{"q":"Una organización dispone de un canal para que el personal notifique eventos sospechosos, pero no tiene un criterio para decidir si un evento es incidente ni procedimientos documentados de respuesta. ¿Qué análisis es más correcto?","options":["El canal de notificación cubre por completo la gestión de incidentes.","Solo falta recopilar evidencias; la decisión sobre incidente puede hacerse informalmente.","La gestión de incidentes requiere distinguir funciones: notificación de eventos, evaluación y decisión sobre si son incidentes, respuesta conforme a procedimientos, aprendizaje y, cuando proceda, recopilación/preservación de evidencias.","El Anexo A no trata incidentes, solo controles preventivos."],"correct":2,"explain":"Justificación: C es correcta porque el Anexo A distingue entre notificación de eventos, evaluación para decidir si son incidentes, respuesta conforme a procedimientos documentados, aprendizaje posterior y recopilación de evidencias cuando corresponda. A es incompleta: un canal de reporte no cubre decisión, respuesta ni aprendizaje. B minimiza indebidamente la necesidad de criterios y procedimientos. D es falsa porque el Anexo A incluye varios controles específicos de gestión de eventos e incidentes de seguridad de la información."},{"q":"Una empresa contrata servicios en la nube para procesar información incluida en el alcance del SGSI. Quiere controlar adquisición, uso, gestión y finalización del servicio conforme a requisitos de seguridad. ¿Qué control es el más específico?","options":["5.19 Seguridad de la información en las relaciones con proveedores.","5.23 Seguridad de la información para el uso de servicios en la nube.","8.14 Redundancia de recursos de tratamiento de la información.","7.11 Instalaciones de suministro."],"correct":1,"explain":"Justificación: B es correcta porque 5.23 se centra específicamente en procesos de adquisición, uso, gestión y finalización de servicios en la nube conforme a requisitos de seguridad de la información. A es relevante pero más general para relaciones con proveedores. C trata disponibilidad mediante redundancia de recursos de tratamiento, no gobierno de servicios cloud. D se refiere a instalaciones de suministro, un control físico/de infraestructura, no a servicios en la nube."},{"q":"¿Cuál de las siguientes relaciones entre controles de acceso es más precisa?","options":["5.15 trata únicamente accesos físicos; los accesos lógicos pertenecen solo a tecnología.","5.16 se limita a contraseñas, y 5.17 se limita al alta y baja de usuarios.","5.15 establece reglas de control de acceso físico y lógico; 5.16 gestiona el ciclo de vida de identidades; 5.17 controla información de autenticación; y 5.18 cubre aprovisionamiento, revisión, modificación y retirada de derechos de acceso.","8.2 sustituye todos los controles organizacionales de acceso porque los privilegios son siempre técnicos."],"correct":2,"explain":"Justificación: C es correcta porque diferencia con precisión los controles organizacionales de acceso: reglas de acceso físico y lógico, ciclo de vida de identidades, información de autenticación y derechos de acceso. A es falsa porque 5.15 incluye acceso físico y lógico. B cruza conceptos: 5.16 no se limita a contraseñas y 5.17 no cubre altas y bajas de usuarios, sino información de autenticación. D es incorrecta porque 8.2 sobre privilegios no sustituye los controles organizacionales de identidad, autenticación y derechos."},{"q":"Una organización genera logs, pero no los protege, no define retención y no analiza eventos relevantes. ¿Qué control del Anexo A está más directamente implicado?","options":["8.8 Gestión de vulnerabilidades técnicas.","8.9 Gestión de la configuración.","8.16 Seguimiento de actividades.","8.15 Registros de eventos."],"correct":3,"explain":"Justificación: D es correcta porque 8.15 se refiere a generar, proteger, almacenar y analizar registros de actividades, excepciones, fallos y otros eventos relevantes. A trata vulnerabilidades técnicas, que pueden detectarse por otros medios, pero no es el control principal de logs. B aborda configuraciones de hardware, software, servicios y redes. C es cercano, pero 8.16 se centra en monitorizar redes, sistemas y aplicaciones para detectar comportamientos anómalos y evaluar posibles incidentes; el caso pregunta específicamente por registros de eventos."},{"q":"En un proyecto de desarrollo, se aprueban requisitos de seguridad al adquirir una aplicación, se aplican principios de arquitectura segura, codificación segura, pruebas de seguridad, separación de entornos, gestión de cambios y control de datos de prueba. ¿Qué lectura experta es correcta?","options":["Se están activando varios controles tecnológicos del Anexo A relacionados con ciclo de vida de desarrollo, requisitos de aplicaciones, arquitectura, codificación, pruebas, entornos, cambios y datos de prueba; su aplicabilidad debe justificarse desde el tratamiento de riesgos.","Todo queda cubierto únicamente por 8.25, por lo que no hace falta analizar los demás controles.","Si la aplicación es adquirida y no desarrollada internamente, ISO/IEC 27001 no exige considerar requisitos de seguridad.","La separación de entornos solo es obligatoria en organizaciones con certificación de desarrollo software específica."],"correct":0,"explain":"Justificación: A es correcta porque el escenario combina controles tecnológicos distintos: requisitos de seguridad de aplicaciones, arquitectura segura, codificación segura, pruebas, separación de entornos, cambios y datos de prueba, además del enfoque general de desarrollo seguro. B es incompleta porque 8.25 no absorbe todos los controles relacionados. C es falsa: al adquirir aplicaciones también deben identificarse, especificarse y aprobarse requisitos de seguridad. D inventa una condición externa; la separación de entornos es un control del Anexo A cuya aplicabilidad se justifica por riesgos y contexto, no por una certificación adicional."}]; const state = {answers: new Array(q.length).fill(null)}; function escapeHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");} function startQuiz(){renderQuiz(); document.getElementById("quiz").style.display="block"; document.getElementById("hero").style.display="none";} function renderQuiz(){const s = document.getElementById("quiz"); s.innerHTML = q.map((qu,i) => "<article class=\"question-card\"><div class=\"q-text\">" + escapeHtml(qu.q) + "</div><div class=\"options\">" + qu.options.map((o,j) => "<label class=\"option\"><input type=\"radio\" name=\"q" + i + "\" value=\"" + j + "\" onchange=\"answerQuestion(" + i + "," + j + ")\"/><span>" + escapeHtml(o) + "</span></label>").join("") + "</div><div class=\"feedback\" id=\"f" + i + "\"></div></article>").join("") + "<div class=\"actions\" style=\"margin-top:24px;justify-content:center;\"><button class=\"btn-primary\" onclick=\"submit()\">Enviar</button><button class=\"btn-secondary\" onclick=\"reset()\">Limpiar</button></div>";} function answerQuestion(i,v){state.answers[i] = v;} function submit(){const u = state.answers.map((v,i) => v === null ? i : null).filter(v => v !== null); if(u.length){alert("Contesta: " + u.map(i => i+1).join(", ")); return;} const user = document.getElementById("username").value.trim() || "Invitado"; const h = q.filter((qu,i) => qu.correct === state.answers[i]).length; const p = Math.round(h/q.length*100); q.forEach((qu,i) => {const se = state.answers[i]; const ok = se === qu.correct; document.querySelector("input[name=\"q" + i + "\"][value=\"" + se + "\"]").parentElement.classList.add(ok ? "correct" : "wrong"); document.querySelector("input[name=\"q" + i + "\"][value=\"" + qu.correct + "\"]").parentElement.classList.add("correct"); const fb = document.getElementById("f" + i); fb.className = "feedback " + (ok ? "ok" : "bad"); fb.innerHTML = "<h4>" + (ok ? "✅" : "❌") + "</h4><p><strong>Tu respuesta:</strong> " + escapeHtml(qu.options[se]) + "</p>" + (ok ? "" : "<p><strong>Correcta:</strong> " + escapeHtml(qu.options[qu.correct]) + "</p>") + (qu.explain ? "<p><strong>Justificación:</strong> " + escapeHtml(qu.explain) + "</p>" : ""); fb.style.display = "block";}); document.querySelector("#quiz .actions").innerHTML = "<button class=\"btn-primary\" onclick=\"showReport()\">Ver informe</button><button class=\"btn-secondary\" onclick=\"reset()\">Reintentar</button>"; state.score = {user, pct: p, hits: h, fails: q.length - h};} function showReport(){document.getElementById("scorePct").textContent = state.score.pct + "%"; document.getElementById("scoreHits").textContent = state.score.hits; document.getElementById("scoreFails").textContent = state.score.fails; document.getElementById("reportUser").textContent = state.score.user; document.getElementById("reportBody").innerHTML = q.map((qu,i) => {const ok = state.answers[i] === qu.correct; return "<tr><td>" + (i+1) + "</td><td>" + escapeHtml(qu.q) + "</td><td>" + escapeHtml(qu.options[state.answers[i]]) + "</td><td>" + escapeHtml(qu.options[qu.correct]) + "</td><td><span class=\"pill " + (ok ? "ok" : "bad") + "\">" + (ok ? "✓" : "✗") + "</span></td></tr>";}).join(""); document.getElementById("quiz").style.display = "none"; document.getElementById("report").style.display = "block";} function reset(){if(confirm("¿Limpiar y volver al inicio?")){state.answers = new Array(q.length).fill(null); document.getElementById("report").style.display = "none"; document.getElementById("quiz").style.display = "none"; document.getElementById("hero").style.display = "block";}}</script></body></html>
