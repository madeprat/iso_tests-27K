<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ISO 27001 · Test 3</title><style>:root{--bg:#0b1020;--panel:#141b34;--text:#eef2ff;--muted:#b9c2e6;--ok:#1db954;--bad:#ff5d73;--accent:#6ea8fe;--accent-2:#9b7bff;--border:#2a3567;}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#0a0f1f,#101733 45%,#0d1430);color:var(--text)}.container{max-width:1100px;margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,rgba(110,168,254,.18),rgba(155,123,255,.16));border:1px solid var(--border);border-radius:22px;padding:24px}.badges{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 6px}.badge{background:#0f1733;border:1px solid var(--border);color:var(--muted);padding:8px 12px;border-radius:999px;font-size:13px}h1{margin:0 0 10px;font-size:34px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:18px}.card{background:rgba(20,27,52,.92);border:1px solid var(--border);border-radius:18px;padding:18px}label{display:block;font-weight:700;margin:10px 0 6px}input[type=text]{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:#0d1530;color:var(--text)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white}.btn-secondary{background:#202c57;color:var(--text);border:1px solid var(--border)}.quiz-shell{display:none;margin-top:22px}.question-card{background:rgba(20,27,52,.96);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}.q-text{font-size:20px;font-weight:800;margin:8px 0 14px}.options{display:grid;gap:10px}.option{border:1px solid var(--border);background:#0f1733;border-radius:14px;padding:14px;display:flex;gap:12px;cursor:pointer}.option:hover{border-color:#4b62b0}.option input{margin-top:4px}.option.correct{border-color:rgba(29,185,84,.7);background:rgba(29,185,84,.12)}.option.wrong{border-color:rgba(255,93,115,.7);background:rgba(255,93,115,.12)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;border:1px solid var(--border);background:#111936;font-size:13px}.feedback h4{margin:0 0 8px}.feedback p{margin:6px 0}.scorebar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:#0f1733;border:1px solid var(--border);border-radius:16px;padding:14px}.metric .value{font-size:28px;font-weight:900}.metric .label{color:var(--muted);font-size:13px}.report{display:none}.report table{width:100%;border-collapse:collapse;font-size:14px}.report th,.report td{border:1px solid var(--border);padding:10px}.report th{background:#121b39}.pill{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.pill.ok{background:rgba(29,185,84,.16);color:#93ffc0}.pill.bad{background:rgba(255,93,115,.14);color:#ffb2bc}@media print{.hero,.card,.question-card{background:white;color:black;border:1px solid #bbb}.btn-primary,.btn-secondary,.actions{display:none}.report{display:block}.quiz-shell{display:none}}</style></head><body><div class="container"><section class="hero" id="hero"><div class="badges"><span class="badge">Test 3/5</span><span class="badge">8 preguntas</span></div><h1>ISO 27001</h1><div class="grid"><div class="card"><h2>Identificación</h2><label for="username">Usuario</label><input id="username" type="text" maxlength="80" placeholder="Nombre / Cargo" /><div class="actions"><button class="btn-primary" onclick="startQuiz()">Comenzar</button><button class="btn-secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h3>Info</h3><div><strong>Preguntas:</strong> <span id="qCount">8</span></div></div></div></section><section id="quiz" class="quiz-shell"></section><section id="report" class="report card"><h2>Informe</h2><div class="scorebar"><div class="metric"><div class="value" id="scorePct">0%</div><div class="label">Puntuación</div></div><div class="metric"><div class="value" id="scoreHits">0</div><div class="label">Aciertos</div></div><div class="metric"><div class="value" id="scoreFails">0</div><div class="label">Errores</div></div><div class="metric"><div class="value" id="reportUser">—</div><div class="label">Usuario</div></div></div><table><thead><tr><th>#</th><th>Pregunta</th><th>Tu respuesta</th><th>Correcta</th><th>Resultado</th></tr></thead><tbody id="reportBody"></tbody></table></section></div><script>const q = [{"q":"La organización decide cambiar la metodología de evaluación de riesgos y la estructura de la Declaración de Aplicabilidad. ¿Qué exige la norma respecto a este cambio?","options":["Que se ejecute inmediatamente si reduce carga administrativa.","Que se lleve a cabo de manera planificada cuando la organización determine la necesidad del cambio.","Que solo se revise en la siguiente auditoría externa.","Que se apruebe exclusivamente por el proveedor de consultoría que mantiene el SGSI."],"correct":1,"explain":"Justificación: B es correcta porque el apartado 6.3 exige que, cuando se determine la necesidad de cambios en el SGSI, estos se lleven a cabo de manera planificada. A es incorrecta porque la agilidad no elimina la planificación. C reduce indebidamente el cambio a una comprobación futura, cuando debe gestionarse al realizarlo. D es incorrecta porque la responsabilidad del SGSI es de la organización; un consultor puede apoyar, pero no sustituye la planificación y control del cambio por parte de la organización."},{"q":"¿Qué interpretación es más correcta sobre la competencia en el SGSI?","options":["Basta con impartir formación anual de seguridad a todo el personal.","La organización debe determinar competencias necesarias para trabajos bajo su control que afecten al desempeño, asegurar competencia con base en educación, formación o experiencia, actuar si procede y conservar evidencia apropiada.","Solo deben evidenciarse competencias del equipo de seguridad, porque el resto del personal no afecta al SGSI.","La competencia se demuestra únicamente mediante certificados externos individuales."],"correct":1,"explain":"Justificación: B es correcta porque competencia no equivale solo a formación: exige determinar la competencia necesaria, asegurarla con base en educación, formación o experiencia, actuar para adquirirla cuando proceda, evaluar la eficacia de esas acciones y conservar evidencia. A es incompleta porque una formación anual genérica no demuestra por sí sola competencia para todos los trabajos relevantes. C es falsa: cualquier persona bajo control de la organización puede afectar al desempeño. D es excesiva porque la norma no exige que la evidencia sea únicamente certificación externa."},{"q":"¿Qué exige la concienciación según el apartado 7.3?","options":["Que todas las personas conozcan el detalle técnico de los controles criptográficos y de red.","Que las personas bajo control de la organización sean conscientes de la política, de su contribución a la eficacia del SGSI y de las implicaciones de incumplir requisitos.","Que únicamente los administradores de sistemas conozcan la política de seguridad.","Que se firme una declaración anual de confidencialidad, lo que sustituye cualquier otra acción de concienciación."],"correct":1,"explain":"Justificación: B es correcta porque la concienciación se orienta a que las personas conozcan la política, su contribución a la eficacia del SGSI y las consecuencias de incumplir requisitos. A confunde concienciación con conocimiento técnico especializado. C es incorrecta porque la concienciación aplica a personas bajo control de la organización, no solo a administradores. D puede ser una evidencia parcial o un control relacionado, pero no sustituye por sí misma la concienciación sobre política, contribución e implicaciones del incumplimiento."},{"q":"Al definir comunicaciones internas y externas pertinentes al SGSI, ¿qué conjunto coincide mejor con el apartado 7.4?","options":["Qué comunicar, cuándo comunicar, con quién comunicar y cómo comunicar.","Qué comunicar, quién aprueba la política, qué controles se excluyen y quién audita.","Solo comunicaciones externas, porque las internas se cubren con concienciación.","Únicamente incidentes de seguridad, porque son la materia propia de comunicación del SGSI."],"correct":0,"explain":"Justificación: A es correcta porque el apartado 7.4 exige determinar las comunicaciones internas y externas pertinentes incluyendo contenido, momento, destinatarios/interlocutores y forma. B mezcla elementos de otros requisitos que no constituyen el esquema de comunicación. C es incorrecta porque la norma contempla comunicaciones internas y externas. D es demasiado restrictiva: los incidentes son una materia relevante, pero no agotan las comunicaciones pertinentes del SGSI."},{"q":"¿Cuál es la interpretación correcta de la información documentada del SGSI?","options":["Solo debe existir la información expresamente exigida por la norma; cualquier documento adicional aumenta el riesgo de no conformidad.","Debe incluir la información requerida por la norma y la que la organización determine necesaria para la eficacia del SGSI.","Debe limitarse a procedimientos, porque los registros no son información documentada.","Debe ser idéntica en todas las organizaciones certificadas para asegurar comparabilidad."],"correct":1,"explain":"Justificación: B es correcta porque la información documentada del SGSI incluye tanto la requerida por la norma como la que la organización determina necesaria para la eficacia del sistema. A es incorrecta porque la organización puede necesitar documentación adicional por tamaño, complejidad, procesos o competencia. C es falsa porque la información documentada puede incluir procedimientos y evidencias/registros. D es incorrecta porque la norma es genérica y reconoce que el alcance documental varía entre organizaciones."},{"q":"Cuando se crea o actualiza información documentada del SGSI, ¿qué debe asegurarse según corresponda?","options":["Que todo documento tenga firma manuscrita, sello físico y custodia en papel.","Identificación y descripción, formato y soporte, y revisión y aprobación respecto a idoneidad y adecuación.","Que el documento no sea accesible fuera del área de seguridad.","Que se publique sin revisión para favorecer la agilidad operativa."],"correct":1,"explain":"Justificación: B es correcta porque la norma exige, según corresponda, identificación y descripción, formato y soporte, y revisión y aprobación con respecto a idoneidad y adecuación. A introduce formalismos físicos no exigidos. C confunde protección con restricción absoluta: la información debe estar disponible donde y cuando se necesite, con acceso adecuado. D contradice el requisito de revisión y aprobación; la agilidad no puede eliminar la adecuación documental."},{"q":"La información documentada requerida por el SGSI está en un repositorio, pero no hay control de acceso, control de versión ni reglas de conservación. ¿Cuál es la valoración más correcta?","options":["Es aceptable si el repositorio tiene copias de seguridad.","Es aceptable si la documentación solo la usa el equipo de seguridad.","Es insuficiente, porque la información documentada debe estar disponible y protegida, y deben tratarse actividades como acceso, uso, almacenamiento, control de cambios, conservación y disposición, según aplique.","Es irrelevante para ISO/IEC 27001 porque la norma solo evalúa controles técnicos."],"correct":2,"explain":"Justificación: C es correcta porque el control de la información documentada exige disponibilidad, preparación para el uso y protección adecuada, incluyendo actividades como distribución, acceso, recuperación, uso, almacenamiento, preservación, control de cambios, conservación y disposición, según aplique. A es incompleta: las copias de seguridad no sustituyen el control de acceso ni de versiones. B es incorrecta porque el uso restringido no elimina los requisitos de control. D es falsa: ISO/IEC 27001 evalúa un sistema de gestión, no solo controles técnicos."},{"q":"En operación, una organización ha planificado procesos del SGSI, pero no ha definido criterios operacionales ni controles de proceso; además, no revisa consecuencias de cambios no previstos. ¿Qué falta?","options":["Solo falta una auditoría interna adicional.","Falta planificación y control operacional: criterios para procesos, controles conforme a criterios, información documentada en la medida necesaria, control de cambios planificados y revisión de cambios no previstos.","Falta exclusivamente actualizar la política de seguridad.","No falta nada si el plan de tratamiento de riesgos existe en formato aprobado."],"correct":1,"explain":"Justificación: B es correcta porque la operación del SGSI exige planificar, implementar y controlar procesos, establecer criterios, implementar controles conforme a esos criterios, mantener información documentada cuando sea necesario, controlar cambios planificados y revisar consecuencias de cambios no previstos. A puede ser una acción de evaluación, pero no sustituye el control operacional. C es parcial y no trata la operación. D es insuficiente porque el plan de tratamiento no reemplaza los controles operacionales de los procesos del SGSI."}]; const state = {answers: new Array(q.length).fill(null)}; function escapeHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");} function startQuiz(){renderQuiz(); document.getElementById("quiz").style.display="block"; document.getElementById("hero").style.display="none";} function renderQuiz(){const s = document.getElementById("quiz"); s.innerHTML = q.map((qu,i) => "<article class=\"question-card\"><div class=\"q-text\">" + escapeHtml(qu.q) + "</div><div class=\"options\">" + qu.options.map((o,j) => "<label class=\"option\"><input type=\"radio\" name=\"q" + i + "\" value=\"" + j + "\" onchange=\"answerQuestion(" + i + "," + j + ")\"/><span>" + escapeHtml(o) + "</span></label>").join("") + "</div><div class=\"feedback\" id=\"f" + i + "\"></div></article>").join("") + "<div class=\"actions\" style=\"margin-top:24px;justify-content:center;\"><button class=\"btn-primary\" onclick=\"submit()\">Enviar</button><button class=\"btn-secondary\" onclick=\"reset()\">Limpiar</button></div>";} function answerQuestion(i,v){state.answers[i] = v;} function submit(){const u = state.answers.map((v,i) => v === null ? i : null).filter(v => v !== null); if(u.length){alert("Contesta: " + u.map(i => i+1).join(", ")); return;} const user = document.getElementById("username").value.trim() || "Invitado"; const h = q.filter((qu,i) => qu.correct === state.answers[i]).length; const p = Math.round(h/q.length*100); q.forEach((qu,i) => {const se = state.answers[i]; const ok = se === qu.correct; document.querySelector("input[name=\"q" + i + "\"][value=\"" + se + "\"]").parentElement.classList.add(ok ? "correct" : "wrong"); document.querySelector("input[name=\"q" + i + "\"][value=\"" + qu.correct + "\"]").parentElement.classList.add("correct"); const fb = document.getElementById("f" + i); fb.className = "feedback " + (ok ? "ok" : "bad"); fb.innerHTML = "<h4>" + (ok ? "✅" : "❌") + "</h4><p><strong>Tu respuesta:</strong> " + escapeHtml(qu.options[se]) + "</p>" + (ok ? "" : "<p><strong>Correcta:</strong> " + escapeHtml(qu.options[qu.correct]) + "</p>") + (qu.explain ? "<p><strong>Justificación:</strong> " + escapeHtml(qu.explain) + "</p>" : ""); fb.style.display = "block";}); document.querySelector("#quiz .actions").innerHTML = "<button class=\"btn-primary\" onclick=\"showReport()\">Ver informe</button><button class=\"btn-secondary\" onclick=\"reset()\">Reintentar</button>"; state.score = {user, pct: p, hits: h, fails: q.length - h};} function showReport(){document.getElementById("scorePct").textContent = state.score.pct + "%"; document.getElementById("scoreHits").textContent = state.score.hits; document.getElementById("scoreFails").textContent = state.score.fails; document.getElementById("reportUser").textContent = state.score.user; document.getElementById("reportBody").innerHTML = q.map((qu,i) => {const ok = state.answers[i] === qu.correct; return "<tr><td>" + (i+1) + "</td><td>" + escapeHtml(qu.q) + "</td><td>" + escapeHtml(qu.options[state.answers[i]]) + "</td><td>" + escapeHtml(qu.options[qu.correct]) + "</td><td><span class=\"pill " + (ok ? "ok" : "bad") + "\">" + (ok ? "✓" : "✗") + "</span></td></tr>";}).join(""); document.getElementById("quiz").style.display = "none"; document.getElementById("report").style.display = "block";} function reset(){if(confirm("¿Limpiar y volver al inicio?")){state.answers = new Array(q.length).fill(null); document.getElementById("report").style.display = "none"; document.getElementById("quiz").style.display = "none"; document.getElementById("hero").style.display = "block";}}</script></body></html>
