<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ISO 27001 · Test 1</title><style>:root{--bg:#0b1020;--panel:#141b34;--text:#eef2ff;--muted:#b9c2e6;--ok:#1db954;--bad:#ff5d73;--accent:#6ea8fe;--accent-2:#9b7bff;--border:#2a3567;}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#0a0f1f,#101733 45%,#0d1430);color:var(--text)}.container{max-width:1100px;margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,rgba(110,168,254,.18),rgba(155,123,255,.16));border:1px solid var(--border);border-radius:22px;padding:24px}.badges{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 6px}.badge{background:#0f1733;border:1px solid var(--border);color:var(--muted);padding:8px 12px;border-radius:999px;font-size:13px}h1{margin:0 0 10px;font-size:34px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:18px}.card{background:rgba(20,27,52,.92);border:1px solid var(--border);border-radius:18px;padding:18px}label{display:block;font-weight:700;margin:10px 0 6px}input[type=text]{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:#0d1530;color:var(--text)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white}.btn-secondary{background:#202c57;color:var(--text);border:1px solid var(--border)}.quiz-shell{display:none;margin-top:22px}.question-card{background:rgba(20,27,52,.96);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}.q-text{font-size:20px;font-weight:800;margin:8px 0 14px}.options{display:grid;gap:10px}.option{border:1px solid var(--border);background:#0f1733;border-radius:14px;padding:14px;display:flex;gap:12px;cursor:pointer}.option:hover{border-color:#4b62b0}.option input{margin-top:4px}.option.correct{border-color:rgba(29,185,84,.7);background:rgba(29,185,84,.12)}.option.wrong{border-color:rgba(255,93,115,.7);background:rgba(255,93,115,.12)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:14px;border:1px solid var(--border);background:#111936;font-size:13px}.feedback h4{margin:0 0 8px}.feedback p{margin:6px 0}.scorebar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:#0f1733;border:1px solid var(--border);border-radius:16px;padding:14px}.metric .value{font-size:28px;font-weight:900}.metric .label{color:var(--muted);font-size:13px}.report{display:none}.report table{width:100%;border-collapse:collapse;font-size:14px}.report th,.report td{border:1px solid var(--border);padding:10px}.report th{background:#121b39}.pill{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.pill.ok{background:rgba(29,185,84,.16);color:#93ffc0}.pill.bad{background:rgba(255,93,115,.14);color:#ffb2bc}@media print{.hero,.card,.question-card{background:white;color:black;border:1px solid #bbb}.btn-primary,.btn-secondary,.actions{display:none}.report{display:block}.quiz-shell{display:none}}</style></head><body><div class="container"><section class="hero" id="hero"><div class="badges"><span class="badge">Test 1/5</span><span class="badge">8 preguntas</span></div><h1>ISO 27001</h1><div class="grid"><div class="card"><h2>Identificación</h2><label for="username">Usuario</label><input id="username" type="text" maxlength="80" placeholder="Nombre / Cargo" /><div class="actions"><button class="btn-primary" onclick="startQuiz()">Comenzar</button><button class="btn-secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h3>Info</h3><div><strong>Preguntas:</strong> <span id="qCount">8</span></div></div></div></section><section id="quiz" class="quiz-shell"></section><section id="report" class="report card"><h2>Informe</h2><div class="scorebar"><div class="metric"><div class="value" id="scorePct">0%</div><div class="label">Puntuación</div></div><div class="metric"><div class="value" id="scoreHits">0</div><div class="label">Aciertos</div></div><div class="metric"><div class="value" id="scoreFails">0</div><div class="label">Errores</div></div><div class="metric"><div class="value" id="reportUser">—</div><div class="label">Usuario</div></div></div><table><thead><tr><th>#</th><th>Pregunta</th><th>Tu respuesta</th><th>Correcta</th><th>Resultado</th></tr></thead><tbody id="reportBody"></tbody></table></section></div><script>const q = [{"q":"Una organización quiere reclamar conformidad con UNE-ISO/IEC 27001:2023, pero propone excluir el apartado 7.2 porque todo su personal técnico ya tiene certificaciones profesionales. ¿Cuál es la interpretación correcta?","options":["Es aceptable excluir 7.2 si se demuestra que las certificaciones profesionales cubren la competencia técnica.","No es aceptable excluir requisitos de los capítulos 4 a 10 cuando se reclama conformidad con la norma.","Es aceptable excluir 7.2 si la exclusión se justifica en la Declaración de Aplicabilidad.","Es aceptable excluir cualquier requisito que no genere riesgos significativos de seguridad de la información."],"correct":1,"explain":"Justificación: B es correcta porque la norma no permite excluir requisitos de los capítulos 4 a 10 cuando una organización reclama conformidad. A es incorrecta porque disponer de personal certificado puede ser evidencia de competencia, pero no elimina el requisito de determinar, asegurar y conservar evidencia de la competencia. C confunde los requisitos del cuerpo principal con los controles del Anexo A: la Declaración de Aplicabilidad puede justificar exclusiones de controles del Anexo A, no de requisitos 4 a 10. D también es incorrecta porque la aplicabilidad de los requisitos normativos no depende de que la organización los considere de bajo riesgo."},{"q":"Al determinar las necesidades y expectativas de las partes interesadas, ¿cuál es la decisión que exige realmente la norma?","options":["Identificar únicamente requisitos legales y regulatorios, porque los contractuales se gestionan fuera del SGSI.","Incorporar automáticamente todos los requisitos de todas las partes interesadas al SGSI.","Determinar las partes interesadas relevantes, sus requisitos relevantes y cuáles de esos requisitos se abordarán mediante el SGSI.","Documentar solo las expectativas de clientes y autoridades, porque son las únicas partes interesadas certificables."],"correct":2,"explain":"Justificación: C es correcta porque el enfoque del apartado 4.2 no consiste solo en listar partes interesadas, sino en determinar cuáles son relevantes, qué requisitos son relevantes y cuáles se abordarán a través del SGSI. A es incompleta: los requisitos contractuales pueden ser relevantes, junto con los legales y regulatorios. B es excesiva porque no todo requisito de toda parte interesada entra automáticamente en el SGSI; hay una decisión de relevancia y abordaje. D restringe indebidamente el análisis a clientes y autoridades, cuando puede haber otras partes interesadas relevantes."},{"q":"Una organización define el alcance del SGSI como “toda la empresa”, sin analizar interfaces con proveedores críticos ni dependencias con servicios externos. ¿Qué valoración es más correcta?","options":["Es suficiente, porque un alcance amplio cubre automáticamente todas las interfaces y dependencias.","Es insuficiente, porque al determinar el alcance deben considerarse cuestiones internas y externas, requisitos de partes interesadas e interfaces y dependencias con otras organizaciones.","Es suficiente si la alta dirección aprueba formalmente el alcance y lo publica en la intranet.","Es insuficiente solo si esos proveedores están incluidos en la Declaración de Aplicabilidad."],"correct":1,"explain":"Justificación: B es correcta porque el alcance debe establecer límites y aplicabilidad del SGSI considerando el contexto, requisitos de partes interesadas e interfaces y dependencias con otras organizaciones. A es incorrecta porque un alcance amplio pero genérico no demuestra que se hayan considerado dependencias críticas. C es insuficiente: la aprobación formal no sustituye el análisis requerido. D reduce el problema al tratamiento de controles, cuando el alcance se determina antes y condiciona todo el SGSI, incluida la evaluación de riesgos, la operación y la evaluación del desempeño."},{"q":"¿Cuál de las siguientes actuaciones demuestra mejor el liderazgo exigido por el apartado 5.1?","options":["Nombrar a un responsable de seguridad y trasladarle toda la responsabilidad de cumplimiento del SGSI.","Aprobar una política de seguridad y dejar que el área técnica decida si necesita recursos.","Asegurar que política y objetivos son compatibles con la dirección estratégica, integrar requisitos del SGSI en los procesos, proporcionar recursos y promover la mejora continua.","Revisar únicamente los incidentes graves, porque el liderazgo se demuestra cuando se producen crisis relevantes."],"correct":2,"explain":"Justificación: C es correcta porque recoge la lógica de liderazgo de la norma: dirección estratégica, integración en procesos, recursos, comunicación, eficacia, apoyo a personas y mejora continua. A es incorrecta porque la alta dirección puede asignar responsabilidades, pero no descargar su liderazgo y compromiso. B es parcial: aprobar una política sin asegurar recursos ni integración no cubre el requisito. D es reactiva y limitada; el liderazgo no se demuestra solo ante incidentes, sino mediante la dirección activa del sistema y su integración en la gestión ordinaria."},{"q":"Sobre la política de seguridad de la información, ¿cuál de las siguientes afirmaciones es correcta?","options":["Debe ser adecuada al propósito de la organización, incluir objetivos o un marco para establecerlos, comprometer cumplimiento y mejora continua, estar documentada, comunicarse internamente y estar disponible para partes interesadas cuando proceda.","Debe contener necesariamente todos los controles del Anexo A y describir su implantación técnica.","Debe ser aprobada por el responsable del SGSI; la alta dirección solo debe recibir información de su publicación.","Debe ser confidencial, porque al tratar de seguridad de la información no debe estar disponible para ninguna parte interesada externa."],"correct":0,"explain":"Justificación: A es correcta porque sintetiza los elementos exigidos para la política: adecuación al propósito, relación con objetivos, compromiso de cumplimiento, mejora continua, disponibilidad como información documentada, comunicación interna y disponibilidad a partes interesadas cuando sea apropiado. B es incorrecta porque la política no debe contener todos los controles ni su detalle técnico. C es contraria a la norma: la política debe establecerla la alta dirección. D también es errónea: la norma contempla que esté disponible para partes interesadas, según proceda."},{"q":"En relación con los roles, responsabilidades y autoridades, ¿qué exige la norma de forma específica?","options":["Que exista siempre un CISO independiente del resto de áreas y con autoridad jerárquica sobre todos los procesos.","Que las responsabilidades estén documentadas, pero no necesariamente comunicadas dentro de la organización.","Que los auditores internos asuman la responsabilidad de asegurar la conformidad del SGSI.","Que la alta dirección asegure la asignación y comunicación de responsabilidades y autoridades pertinentes, incluida la responsabilidad de asegurar conformidad e informar del desempeño del SGSI."],"correct":3,"explain":"Justificación: D es correcta porque la alta dirección debe asegurar que las responsabilidades y autoridades se asignan y comunican, y debe asignar responsabilidad y autoridad para asegurar la conformidad del SGSI e informar sobre su desempeño. A introduce una estructura organizativa concreta que la norma no exige. B es insuficiente porque la comunicación interna es parte del requisito. C es incorrecta porque los auditores internos proporcionan información sobre conformidad y eficacia, pero no sustituyen la responsabilidad asignada por la alta dirección para asegurar la conformidad del sistema."},{"q":"Una persona afirma que los requisitos aparecen en la norma en el orden exacto en que deben implantarse y que los primeros apartados son más importantes. ¿Qué respuesta es correcta?","options":["Es correcto, porque la norma sigue una secuencia obligatoria de implantación.","Es correcto solo para los capítulos 4 a 6, pero no para los capítulos 7 a 10.","No es correcto; el orden de presentación no implica prioridad ni secuencia obligatoria de implantación.","Es correcto para las auditorías de certificación, aunque no para auditorías internas."],"correct":2,"explain":"Justificación: C es correcta porque la propia lógica de las normas de sistema de gestión no convierte el orden de los apartados en una secuencia de implantación ni en una jerarquía de importancia. A es falsa porque puede implantarse de forma iterativa y adaptada al contexto. B inventa una distinción que la norma no hace. D también es incorrecta: en auditoría se puede seguir una planificación lógica distinta, pero no porque el orden del texto imponga una prioridad normativa."},{"q":"Una organización externaliza una parte relevante del procesamiento de información, pero no la menciona al establecer el alcance del SGSI. ¿Cuál es el principal problema desde la lógica de la norma?","options":["El alcance debe reflejar límites y aplicabilidad, considerando interfaces y dependencias con actividades realizadas por otras organizaciones.","El proveedor debe certificarse obligatoriamente en ISO/IEC 27001 antes de prestar el servicio.","La externalización elimina la responsabilidad de la organización sobre esos riesgos.","La cuestión solo afecta al Anexo A, no al alcance del SGSI."],"correct":0,"explain":"Justificación: A es correcta porque, al determinar el alcance, la organización debe considerar las interfaces y dependencias entre sus actividades y las realizadas por otras organizaciones. B es incorrecta porque la norma no exige automáticamente que todo proveedor esté certificado. C es contraria a la lógica del SGSI: externalizar no elimina la necesidad de controlar riesgos relevantes. D es incompleta; los controles del Anexo A pueden tratar la relación con proveedores, pero antes el alcance debe reflejar adecuadamente las dependencias relevantes."}]; const state = {answers: new Array(q.length).fill(null)}; function escapeHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");} function startQuiz(){renderQuiz(); document.getElementById("quiz").style.display="block"; document.getElementById("hero").style.display="none";} function renderQuiz(){const s = document.getElementById("quiz"); s.innerHTML = q.map((qu,i) => "<article class=\"question-card\"><div class=\"q-text\">" + escapeHtml(qu.q) + "</div><div class=\"options\">" + qu.options.map((o,j) => "<label class=\"option\"><input type=\"radio\" name=\"q" + i + "\" value=\"" + j + "\" onchange=\"answerQuestion(" + i + "," + j + ")\"/><span>" + escapeHtml(o) + "</span></label>").join("") + "</div><div class=\"feedback\" id=\"f" + i + "\"></div></article>").join("") + "<div class=\"actions\" style=\"margin-top:24px;justify-content:center;\"><button class=\"btn-primary\" onclick=\"submit()\">Enviar</button><button class=\"btn-secondary\" onclick=\"reset()\">Limpiar</button></div>";} function answerQuestion(i,v){state.answers[i] = v;} function submit(){const u = state.answers.map((v,i) => v === null ? i : null).filter(v => v !== null); if(u.length){alert("Contesta: " + u.map(i => i+1).join(", ")); return;} const user = document.getElementById("username").value.trim() || "Invitado"; const h = q.filter((qu,i) => qu.correct === state.answers[i]).length; const p = Math.round(h/q.length*100); q.forEach((qu,i) => {const se = state.answers[i]; const ok = se === qu.correct; document.querySelector("input[name=\"q" + i + "\"][value=\"" + se + "\"]").parentElement.classList.add(ok ? "correct" : "wrong"); document.querySelector("input[name=\"q" + i + "\"][value=\"" + qu.correct + "\"]").parentElement.classList.add("correct"); const fb = document.getElementById("f" + i); fb.className = "feedback " + (ok ? "ok" : "bad"); fb.innerHTML = "<h4>" + (ok ? "✅" : "❌") + "</h4><p><strong>Tu respuesta:</strong> " + escapeHtml(qu.options[se]) + "</p>" + (ok ? "" : "<p><strong>Correcta:</strong> " + escapeHtml(qu.options[qu.correct]) + "</p>") + (qu.explain ? "<p><strong>Justificación:</strong> " + escapeHtml(qu.explain) + "</p>" : ""); fb.style.display = "block";}); document.querySelector("#quiz .actions").innerHTML = "<button class=\"btn-primary\" onclick=\"showReport()\">Ver informe</button><button class=\"btn-secondary\" onclick=\"reset()\">Reintentar</button>"; state.score = {user, pct: p, hits: h, fails: q.length - h};} function showReport(){document.getElementById("scorePct").textContent = state.score.pct + "%"; document.getElementById("scoreHits").textContent = state.score.hits; document.getElementById("scoreFails").textContent = state.score.fails; document.getElementById("reportUser").textContent = state.score.user; document.getElementById("reportBody").innerHTML = q.map((qu,i) => {const ok = state.answers[i] === qu.correct; return "<tr><td>" + (i+1) + "</td><td>" + escapeHtml(qu.q) + "</td><td>" + escapeHtml(qu.options[state.answers[i]]) + "</td><td>" + escapeHtml(qu.options[qu.correct]) + "</td><td><span class=\"pill " + (ok ? "ok" : "bad") + "\">" + (ok ? "✓" : "✗") + "</span></td></tr>";}).join(""); document.getElementById("quiz").style.display = "none"; document.getElementById("report").style.display = "block";} function reset(){if(confirm("¿Limpiar y volver al inicio?")){state.answers = new Array(q.length).fill(null); document.getElementById("report").style.display = "none"; document.getElementById("quiz").style.display = "none"; document.getElementById("hero").style.display = "block";}}</script></body></html>
